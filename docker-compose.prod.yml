services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dinevra_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: dinevra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dinevra_admin -d dinevra"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/dinevra/dinevra-api:latest
    ports:
      - "80:8080"
    environment:
      DATABASE_URL: postgres://dinevra_admin:${POSTGRES_PASSWORD}@postgres:5432/dinevra?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      PORT: 8080
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
