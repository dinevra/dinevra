name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Built Backend
      working-directory: ./dinevra-backend
      run: go build -v ./cmd/api

    - name: Run Tests
      working-directory: ./dinevra-backend
      run: go test -v ./... -cover
