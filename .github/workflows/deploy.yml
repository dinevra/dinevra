name: Continuous Deployment

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: dinevra-backend/go.sum

      - name: Run Tests
        working-directory: ./dinevra-backend
        run: go test -v ./...

  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: test-backend # Ensure basic tests pass before deploying anything
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dinevra-dashboard/package-lock.json

      - name: Install Dependencies
        working-directory: ./dinevra-dashboard
        run: npm ci

      - name: Build Dashboard
        working-directory: ./dinevra-dashboard
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync dinevra-dashboard/dist/ s3://app.dinevra.com --delete

  build-push-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: dinevra-backend/go.sum

      - name: Build Linux Binary
        working-directory: ./dinevra-backend
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o api-linux ./cmd/api

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./dinevra-backend
          file: ./dinevra-backend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dinevra-api:latest
            ghcr.io/${{ github.repository_owner }}/dinevra-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: build-push-backend
    steps:
      - name: Execute Remote SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app/dinevra
            # Authenticate Docker to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Pull latest image and restart
            sudo docker compose -f docker-compose.prod.yml pull api
            sudo docker compose -f docker-compose.prod.yml up -d --no-deps api
            # Cleanup old images
            sudo docker image prune -f
