name: Continuous Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write # Required for OIDC
  contents: read
  packages: write

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: dinevra-backend/go.sum

      - name: Run Tests
        working-directory: ./dinevra-backend
        run: go test -v ./...

  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dinevra-dashboard/package-lock.json

      - name: Install Dependencies
        working-directory: ./dinevra-dashboard
        run: npm ci

      - name: Build Dashboard
        working-directory: ./dinevra-dashboard
        run: npm run build

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync dinevra-dashboard/dist/ s3://app.dinevra.com --delete

  build-push-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: dinevra-backend/go.sum

      - name: Build Linux Binary
        working-directory: ./dinevra-backend
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o api-linux ./cmd/api

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./dinevra-backend
          file: ./dinevra-backend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dinevra-api:latest
            ghcr.io/${{ github.repository_owner }}/dinevra-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-backend:
    name: Deploy Backend to EC2 (via SSM)
    runs-on: ubuntu-latest
    needs: build-push-backend
    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Execute Remote SSM Deploy
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'cd /app/dinevra',
              'echo \"${{ secrets.GITHUB_TOKEN }}\" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin',
              'sudo docker compose -f docker-compose.prod.yml --env-file .env.prod pull api',
              'sudo docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps api',
              'sudo docker image prune -f'
            ]" \
            --region us-east-1
