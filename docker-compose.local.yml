version: '3.8'

services:
  backend:
    build: 
      context: ./dinevra-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://dinevra_user:dinevra_password@postgres:5432/dinevra?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=dinevra_user
      - POSTGRES_PASSWORD=dinevra_password
      - POSTGRES_DB=dinevra
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dinevra_user -d dinevra"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
